  frontend: "frontend"

# ── AFI · Architecture of Freedom Intelligence ─────────────────────
# F = (P/D)^α · aplicado à produção industrial
# P = perception (score topológico + fluxo)
# D = distortion (média geométrica ponderada dos canais)
# α = 1.242 (CI 95% exclui 1.0 · Deucalion)
afi:
  alpha: 1.242
  d_channels:
    # Pesos somam 1.0 — validado à startup
    throughput:  0.35   # m²/h vs target
    quality:     0.25   # % não-conformidades + retrabalho
    machine:     0.15   # uptime / breakdowns
    timeline:    0.15   # proximidade ao deadline
    operator:    0.05   # carga / experiência
    setup:       0.05   # tempo de changeover
  seed: 2026

