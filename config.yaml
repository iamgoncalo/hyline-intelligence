# ── Escala · Google Trends + Estratégia ────────────────────────────
# Dados SIMULADOS baseados em tendências públicas do sector janelas PVC
# em Portugal. Substituir por dados reais via API Google Trends quando
# ativada (pypi: pytrends). Valores 0–100 = popularidade relativa.
scale:
  trends_pt:
    - {term: "janelas PVC",                series: [42, 45, 51, 58, 63, 68, 74, 72, 70, 75, 80, 85]}
    - {term: "janelas eficiência energética", series: [22, 28, 35, 41, 48, 56, 62, 66, 71, 78, 84, 91]}
    - {term: "janelas oscilo-batentes",    series: [35, 38, 36, 42, 45, 48, 50, 52, 48, 50, 54, 58]}
    - {term: "reabilitação habitação",     series: [58, 62, 65, 70, 72, 75, 78, 80, 78, 82, 88, 92]}
  strategic_priorities:
    - {id: "SP01", title: "Eficiência energética como diferenciador", confidence: 0.92, horizon_months: 6}
    - {id: "SP02", title: "Linha oscilo-batentes dedicada",           confidence: 0.74, horizon_months: 12}
    - {id: "SP03", title: "Parceria com empresas de reabilitação",    confidence: 0.88, horizon_months: 9}
    - {id: "SP04", title: "Automatização corte — redução 30% manual", confidence: 0.81, horizon_months: 18}

