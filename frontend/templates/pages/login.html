<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HYLINE · Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/planta.css">
  <style>
    html, body { height: 100%; display: flex; align-items: center; justify-content: center; background: var(--surface); overflow: hidden; }
    .login-card { width: 360px; padding: 48px 40px; background: #fff; border: 1px solid var(--hairline); border-radius: 20px; }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 400; color: var(--primary); letter-spacing: 0.04em; text-align: center; display: block; }
    .login-sub { font-size: 11px; color: var(--ink-hint); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; display: block; margin-top: 4px; margin-bottom: 40px; }
    .login-field { margin-bottom: 16px; }
    .login-field label { font-size: 11px; color: var(--ink-hint); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
    .login-field input { width: 100%; border: 1px solid var(--hairline); border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--primary); background: #fff; outline: none; box-sizing: border-box; }
    .login-field input:focus { border-color: var(--secondary); }
    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    .login-btn:hover { background: var(--secondary); }
    .login-error { font-size: 12px; color: var(--red); text-align: center; margin-top: 12px; }
    .login-hint { font-size: 11px; color: var(--ink-hint); text-align: center; margin-top: 24px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="login-card">
    <span class="login-logo">HYLINE</span>
    <span class="login-sub">Inteligência do Espaço</span>
    <form method="POST" action="/login">
      <div class="login-field">
        <label for="username">Utilizador</label>
        <input type="text" id="username" name="username" placeholder="director" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="password">Palavra-passe</label>
        <input type="password" id="password" name="password" placeholder="" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">Entrar</button>
      {% if error %}
      <div class="login-error">Utilizador ou palavra-passe incorrectos.</div>
      {% endif %}
    </form>
    <div class="login-hint">
      director · chefe · dq · hst
    </div>
  </div>
</body>
</html>
